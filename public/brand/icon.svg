<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Parliament/Government themed minimalist black & white favicon -->
  <!-- Represents judicial decisions, parliamentary authority, and accountability -->

  <!-- White background -->
  <rect width="512" height="512" fill="white"/>

  <!-- Outer circle border -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="black" stroke-width="20"/>

  <!-- Gavel/Hammer - symbol of parliamentary decisions and justice -->
  <g transform="translate(256, 256)">
    <!-- Hammer head (horizontal bar) -->
    <rect x="-70" y="-60" width="140" height="50" rx="8" fill="black"/>

    <!-- Hammer handle (vertical line) -->
    <line x1="0" y1="-10" x2="0" y2="90" stroke="black" stroke-width="20" stroke-linecap="round"/>

    <!-- Sound wave lines representing voice/debate in parliament -->
    <path d="M -110 0 Q -110 40 -85 40" stroke="black" stroke-width="12" stroke-linecap="round" fill="none"/>
    <path d="M 110 0 Q 110 40 85 40" stroke="black" stroke-width="12" stroke-linecap="round" fill="none"/>
  </g>
</svg>
